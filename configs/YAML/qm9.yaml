setup:
  run_id: "gnn_v2_max"
  train: true
  batch_size: 256
  epochs: 100
  shuffle: true
  num_workers: 1
  targets:
    - "gap"
  seed: 42
  train_n: null
  val_n: null
  test_n: null
  save_every_epoch: true
  early_stop_patience: 10

model:
  type: "gnn"
  num_layers: 6           # message-passing depth
  pooling: "max"          # max over atom-level features for the readout

optimizer:
  name: "adam"
  lr: 1.0e-3
  decay_factor: 0.5
  decay_patience: 5
  decay_threshold: 1.0e-4

loss:
  name: "huber"
  delta: 0.1

paths:
  train: "/ceph/mbinder/bioqinn/classical/data/train/qm9_train_with_qfim.h5"
  val:   "/ceph/mbinder/bioqinn/classical/data/val/qm9_val_with_qfim.h5"
  test:  "/ceph/mbinder/bioqinn/classical/data/test/qm9_test_with_qfim.h5"
  model_dir: "/ceph/mbinder/qm9-qinn/classical/saved_models/gnn"
