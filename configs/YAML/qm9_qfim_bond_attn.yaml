setup:
  run_id: "gnn_qfim_bond_attn"
  train: true
  batch_size: 256
  epochs: 100
  shuffle: true
  num_workers: 1
  targets:
    - "gap"
  seed: 42
  train_n: null
  val_n: null
  test_n: null
  save_every_epoch: true
  early_stop_patience: 20

model:
  type: "gnn_qfim_bond_attn"
  num_layers: 6
  pooling: "mean_max"
  activation: "silu"
  mlp_residual: true
  msg_layers: 2
  per_layer_edge_update: false   # not used by attn

qfim:
  n_qubits: 10
  per_qubit_dim: 6
  drop_zero_rows: false
  attn_beta_init: 1.0            # learnable temperature on coupling -> attention

optimizer:
  name: "adam"
  lr: 1.0e-3
  schedule: "cosine"
  warmup_epochs: 5
  min_lr: 1.0e-5

loss:
  name: "huber"
  delta: 0.1

exclude_bioqinn:
  enabled: false
  qfim_root: "/work/mbinder/bioqinn/saved_models/run_005/qfim_parallel"

paths:
  train: "/ceph/mbinder/bioqinn/classical/data_no_bioqinn_overlap_uncompressed/train/qm9_train_with_qfim_no_bioqinn_overlap.h5"
  val:   "/ceph/mbinder/bioqinn/classical/data_no_bioqinn_overlap_uncompressed/val/qm9_val_with_qfim_no_bioqinn_overlap.h5"
  test:  "/ceph/mbinder/bioqinn/classical/data_no_bioqinn_overlap_uncompressed/test/qm9_test_with_qfim_no_bioqinn_overlap.h5"
  model_dir: "/ceph/mbinder/qm9-qinn/classical/saved_models/gnn_qfim_attn"
